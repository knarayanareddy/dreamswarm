[advisories]
ignore = [
    "RUSTSEC-2024-0436", # paste is unmaintained, but is essentially a finished transitive dependency of ratatui
]
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
]
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Deny specific problematic crates
deny = []
# Allow specific duplicates that are known-safe
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
