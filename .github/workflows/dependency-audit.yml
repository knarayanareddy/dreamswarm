name: Dependency Audit

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9 AM UTC
  workflow_dispatch:
  push:
    paths:
      - 'Cargo.lock'
      - 'deny.toml'

permissions:
  issues: write

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Install audit tools
        run: |
          cargo binstall cargo-deny --no-confirm --force
          cargo binstall cargo-audit --no-confirm --force
      - name: Run cargo-audit
        run: cargo audit --json > audit-report.json 2>&1 || true
      - name: Run cargo-deny
        run: cargo deny check 2>&1 | tee deny-report.txt || true
      - name: Check for critical vulnerabilities
        id: check
        run: |
          CRITICAL=$(cat audit-report.json | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              vulns = data.get('vulnerabilities', {}).get('list', [])
              critical = [v for v in vulns if v.get('advisory', {}).get('severity', '') == 'critical']
              print(len(critical))
          except:
              print(0)
          " 2>/dev/null || echo "0")
          echo "critical_count=$CRITICAL" >> $GITHUB_OUTPUT
      - name: Create issue for critical vulnerabilities
        if: steps.check.outputs.critical_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('deny-report.txt', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Critical dependency vulnerability detected`,
              body: `## Security Audit Alert\n\n${report.substring(0, 3000)}\n\n_Auto-generated by dependency audit workflow_`,
              labels: ['security', 'critical']
            });
