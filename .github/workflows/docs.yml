name: Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-landing:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Upload landing page
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
