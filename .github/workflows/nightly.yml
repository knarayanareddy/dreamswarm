name: Nightly

on:
  schedule:
    - cron: '0 3 * * *' # 3 AM UTC daily
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  extended-tests:
    name: Extended Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux ripgrep
      - name: Run full test suite with all features
        run: cargo test --all-features --no-fail-fast
    timeout-minutes: 30

  property-tests:
    name: Property Tests (Extended)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux ripgrep
      - name: Run property tests
        run: cargo test --test '*' --features proptest -- --ignored
        env:
          PROPTEST_CASES: 5000
    timeout-minutes: 30

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux ripgrep
      - name: Run benchmarks
        run: cargo bench --all-features 2>&1 | tee benchmark-results.txt
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 30

  fuzz:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Fuzz bash security validators
        run: |
          cd fuzz
          cargo +nightly fuzz run fuzz_bash_security -- -max_total_time=300
        timeout-minutes: 10
        continue-on-error: true

  miri:
    name: Miri (Undefined Behavior Check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
          components: miri
      - name: Run Miri on core modules
        run: |
          cargo +nightly miri test --lib -p dreamswarm -- \
            --skip tools \
            --skip query \
            --skip tui
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"
        timeout-minutes: 20
        continue-on-error: true

  dependency-freshness:
    name: Check Dependency Updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Install cargo-outdated
        run: cargo binstall cargo-outdated --no-confirm --force
      - name: Check for outdated dependencies
        run: |
          cargo outdated --root-deps-only --exit-code 0 | tee outdated.txt
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: outdated.txt
          retention-days: 7
