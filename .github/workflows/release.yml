name: Release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*' # Pre-releases: v0.1.0-beta.1

permissions:
  contents: write
  packages: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: dreamswarm

jobs:
  # ═══════════════════════════════════════════
  # VALIDATE: Ensure tag matches Cargo.toml
  # ═══════════════════════════════════════════
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract and validate version
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Tag version: $TAG_VERSION"
          echo "Cargo version: $CARGO_VERSION"
          if [[ "$TAG_VERSION" != "$CARGO_VERSION" && "$TAG_VERSION" != "$CARGO_VERSION"-* ]]; then
            echo "Tag version ($TAG_VERSION) doesn't match Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
          if [[ "$TAG_VERSION" == *"-"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
      - name: Run full test suite
        run: |
          sudo apt-get update && sudo apt-get install -y tmux ripgrep
          cargo test --all-features

  # ═══════════════════════════════════════════
  # BUILD: Cross-platform binaries
  # ═══════════════════════════════════════════
  build-release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [validate]
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            asset_name: dreamswarm-linux-x86_64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            asset_name: dreamswarm-linux-x86_64-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            asset_name: dreamswarm-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            asset_name: dreamswarm-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            asset_name: dreamswarm-darwin-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "-C link-arg=-s" # Strip debug symbols
      - name: Package binary (Unix)
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} dist/
          cp README.md LICENSE dist/ 2>/dev/null || true
          cd dist
          if [[ "${{ matrix.archive }}" == "tar.gz" ]]; then
            tar czf ../${{ matrix.asset_name }}.tar.gz *
          fi
          # Generate SHA256
          cd ..
          sha256sum ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.tar.gz.sha256

  # ═══════════════════════════════════════════
  # CHANGELOG: Generate from git history
  # ═══════════════════════════════════════════
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: [validate]
    outputs:
      changelog: ${{ steps.changelog.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install git-cliff
        run: |
          cargo install git-cliff || true
      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git-cliff --latest --strip header 2>/dev/null || echo "Release ${{ needs.validate.outputs.version }}")
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ═══════════════════════════════════════════
  # PUBLISH: GitHub Release + crates.io
  # ═══════════════════════════════════════════
  publish-github:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build-release, changelog]
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false
      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -name "*.tar.gz" -exec cp {} release-assets/ \;
          find artifacts/ -name "*.sha256" -exec cp {} release-assets/ \;
          # Create combined checksums file
          cd release-assets
          cat *.sha256 > SHA256SUMS.txt
          echo "Release assets:"
          ls -la
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "DreamSwarm ${{ needs.validate.outputs.version }}"
          body: |
            ## DreamSwarm v${{ needs.validate.outputs.version }}
            ${{ needs.changelog.outputs.changelog }}
            ---
            ### Installation
            **One-liner (Linux/macOS):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/dreamswarm/dreamswarm/main/install.sh | bash
            ```
            ### Verify checksums
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```
          files: release-assets/*
          prerelease: ${{ needs.validate.outputs.prerelease }}
          generate_release_notes: true

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [validate, build-release]
    if: needs.validate.outputs.prerelease == 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Verify crate builds
        run: cargo package --allow-dirty
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # ═══════════════════════════════════════════
  # INSTALL SCRIPT: Update after release
  # ═══════════════════════════════════════════
  update-install-script:
    name: Update Install Script
    runs-on: ubuntu-latest
    needs: [publish-github]
    if: needs.validate.outputs.prerelease == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Update version in install script
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          sed -i "s/LATEST_VERSION=.*/LATEST_VERSION=\"$VERSION\"/" install.sh
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add install.sh
          git diff --staged --quiet || git commit -m "chore: update install script to v$VERSION"
          git push
