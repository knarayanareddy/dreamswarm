name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  merge_group:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"
  MSRV: "1.77.0"

jobs:
  # ═══════════════════════════════════════════
  # STAGE 1: Fast checks (< 2 min)
  # ═══════════════════════════════════════════
  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
          components: rustfmt
      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  lint:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  typos:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master

  # ═══════════════════════════════════════════
  # STAGE 2: Compilation checks (< 5 min)
  # ═══════════════════════════════════════════
  check:
    name: Compile Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Check compilation
        run: cargo check --all-targets --all-features



  # ═══════════════════════════════════════════
  # STAGE 3: Tests (< 15 min)
  # ═══════════════════════════════════════════
  test:
    name: Tests (${{ matrix.os }}, ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    needs: [format, lint, check]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: [stable, nightly]
        exclude:
          - os: macos-latest
            toolchain: nightly
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux ripgrep
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install tmux ripgrep
      - name: Run unit tests
        run: cargo test --lib --all-features
        env:
          RUST_LOG: dreamswarm=debug
      - name: Run integration tests
        run: cargo test --test '*' --all-features
        env:
          RUST_LOG: dreamswarm=info
      - name: Run doc tests
        run: cargo test --doc --all-features

  # ═══════════════════════════════════════════
  # STAGE 4: Coverage (< 10 min)
  # ═══════════════════════════════════════════
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux ripgrep
      - name: Generate coverage report
        run: |
          cargo llvm-cov --all-features \
            --workspace \
            --lcov \
            --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info
          retention-days: 14

  # ═══════════════════════════════════════════
  # STAGE 5: Security (< 5 min)
  # ═══════════════════════════════════════════
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
      - name: Check advisories
        run: cargo deny check advisories
      - name: Check licenses
        run: cargo deny check licenses
      - name: Check bans
        run: cargo deny check bans
      - name: Check sources
        run: cargo deny check sources
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: Audit with cargo-audit
        run: cargo audit

  # ═══════════════════════════════════════════
  # STAGE 7: Build artifacts (verification)
  # ═══════════════════════════════════════════
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [test, security]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools
          echo "CC_x86_64_unknown_linux_musl=musl-gcc" >> $GITHUB_ENV
          echo "CXX_x86_64_unknown_linux_musl=g++" >> $GITHUB_ENV
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc" >> $GITHUB_ENV
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dreamswarm-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/dreamswarm
          retention-days: 7

  # ═══════════════════════════════════════════
  # GATE: All checks must pass
  # ═══════════════════════════════════════════
  ci-pass:
    name: CI Pass Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [format, lint, typos, check, test, coverage, security, build]
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more CI jobs were cancelled"
            exit 1
          fi
          echo "All CI checks passed"
