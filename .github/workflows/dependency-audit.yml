name: Dependency Audit

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
  push:
    paths:
      - 'Cargo.lock'
      - 'deny.toml'

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - name: Install audit tools
        run: cargo binstall cargo-deny cargo-audit --no-confirm --force
      - name: Run checks
        run: |
          cargo audit
          cargo deny check
