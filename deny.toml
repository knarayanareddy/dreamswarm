[advisories]
ignore = [
    "RUSTSEC-2024-0436", # paste (unmaintained, used by ratatui/fastembed)
    "RUSTSEC-2025-0119", # number_prefix (unmaintained)
    "RUSTSEC-2026-0002", # lru (unsoundness in IterMut, used by ratatui)
]

[licenses]
# unlicensed and copyleft keys are removed in favor of explicit allow/deny lists
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
