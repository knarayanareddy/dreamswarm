name: 'Setup Rust Toolchain'
description: 'Install Rust toolchain with caching'

inputs:
  toolchain:
    description: 'Rust toolchain version'
    required: false
    default: 'stable'
  components:
    description: 'Additional components (comma-separated)'
    required: false
    default: ''
  targets:
    description: 'Additional targets (comma-separated)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}

    - name: Install cargo-binstall
      uses: cargo-bins/cargo-binstall@main

    - name: Cache cargo registry + build artifacts
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ inputs.toolchain }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-${{ inputs.toolchain }}-
          ${{ runner.os }}-cargo-

    - name: Install sccache
      shell: bash
      run: |
        cargo binstall sccache --no-confirm --force 2>/dev/null || cargo install sccache
        echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
