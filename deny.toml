[advisories]
# advisories.vulnerability, .unmaintained, .yanked, .notice are now handled by levels
# Default levels for these are usually 'deny' or 'warn'.

[licenses]
# unlicensed and copyleft keys are removed in favor of explicit allow/deny lists
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
